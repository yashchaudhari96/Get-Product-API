<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Product Discovery</title>
<style>
    body{
    font-family: Arial;
    margin:0;
    background:#f3f3f3;
}

header{
    background:#232f3e;
    color:white;
    padding:15px;
}

.filters{
    padding:15px;
    background:white;
    display:flex;
    gap:10px;
}

.product-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.product-card{
    background:white;
    border-radius:8px;
    padding:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.product-card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.product-card h4{
    margin:10px 0;
}

.price{
    color:green;
    font-weight:bold;
}

.rating{
    color:orange;
}

.pagination{
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<header>
    <h2>Product Discovery</h2>
</header>

<div class="filters">

    <input id="query" placeholder="Search product">

    <input id="category" placeholder="Category">

    <input id="minPrice" placeholder="Min Price">

    <input id="rating" placeholder="Rating">


    <button onclick="startSearch()">Search</button>
</div>

<div id="products" class="product-grid"></div>

<div class="pagination">
    <button onclick="prevPage()">Prev</button>
    <span id="pageNumber"></span>
    <button onclick="nextPage()">Next</button>
</div>

<script>
    let page = 0
    let size = 12

async function searchProducts(){
    let category=document.getElementById("category").value
    let minPrice=document.getElementById("minPrice").value
    let rating=document.getElementById("rating").value
    let query = document.getElementById("query").value



   let url = `/api/products?page=${page}&size=${size}`

    if(query){
    url += `&query=${query}`
    }

    if(category){
        url += `&category=${category}`
    }

    if(minPrice){
        url += `&minPrice=${minPrice}`
    }

    if(rating){
        url += `&rating=${rating}`
    }

    let response=await fetch(url)
    let data=await response.json()

    let container=document.getElementById("products")

    container.innerHTML=""

    data.content.forEach(p=>{

        let card=document.createElement("div")
        card.className="product-card"

       card.innerHTML = `
    <img src="${p.thumbnail || 'https://via.placeholder.com/200'}">
    <h4>${p.title}</h4>
    <p class="price">$${p.price}</p>
    <p class="rating">⭐ ${p.rating}</p>
    `

        container.appendChild(card)
    })

    document.getElementById("pageNumber").innerText=`Page ${data.number+1} of ${data.totalPages}`
}

function nextPage(){
        page++
        searchProducts()
}


function prevPage(){
    if(page>0){
        page--
        searchProducts()
    }
}

function startSearch(){
    page = 0
    searchProducts()
}

searchProducts()
</script>

</body>
</html>
